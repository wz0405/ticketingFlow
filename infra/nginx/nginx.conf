worker_processes 1;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/css application/javascript application/json application/wasm;

    # 방문 로그: 리버스 프록시 뒤에서는 실 IP가 X-Forwarded-For에 실린다
    log_format visitor '$remote_addr xff="$http_x_forwarded_for" [$time_local] "$request" $status "$http_user_agent"';
    access_log /var/log/nginx/access.log visitor;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 외부 :8090 진입은 minipg — 라우터가 8090→18443으로 넘기므로 같은 SSL 종단에 도착한다.
    # 포트는 이미 8443으로 바뀐 뒤라 Host 헤더에 남은 원래 포트로 식별한다.
    map $http_host $route_minipg {
        default 0;
        "~:8090$" 1;
    }

    # 스케일아웃 시 인스턴스를 추가하면 nginx가 L/B 역할을 한다
    upstream queue_api {
        server tr-queue-api:8081;
        # server tr-queue-api-2:8081;
    }

    upstream booking_api {
        server tr-booking-api:8082;
        # server tr-booking-api-2:8082;
    }

    upstream queue_ws {
        server tr-queue-api:8091;
    }

    # HTTP
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        include /etc/nginx/conf.d/routes.inc;
    }

    # HTTPS — nginx가 직접 TLS 종단
    server {
        listen 8443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        add_header Strict-Transport-Security "max-age=31536000" always;

        root /usr/share/nginx/html;
        index index.html;

        # minipg 통째 프록시 — 172.19.0.1 = 이 compose 네트워크의 호스트 게이트웨이,
        # minipg-api가 호스트 18080에 퍼블리시되어 있다
        if ($route_minipg) { return 418; }
        error_page 418 = @minipg;
        location @minipg {
            proxy_pass http://172.19.0.1:18080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            # 외부 포트는 8090 고정 — 없으면 Spring이 리다이렉트에서 포트를 떨어뜨린다
            proxy_set_header X-Forwarded-Port 8090;
        }

        include /etc/nginx/conf.d/routes.inc;
    }
}
