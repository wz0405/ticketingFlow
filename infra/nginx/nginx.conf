worker_processes 1;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/css application/javascript application/json application/wasm;

    # 방문 로그: 리버스 프록시 뒤에서는 실 IP가 X-Forwarded-For에 실린다
    log_format visitor '$remote_addr xff="$http_x_forwarded_for" [$time_local] "$request" $status "$http_user_agent"';
    access_log /var/log/nginx/access.log visitor;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 스케일아웃 시 인스턴스를 추가하면 nginx가 L/B 역할을 한다
    upstream queue_api {
        server tr-queue-api:8081;
        # server tr-queue-api-2:8081;
    }

    upstream booking_api {
        server tr-booking-api:8082;
        # server tr-booking-api-2:8082;
    }

    upstream queue_ws {
        server tr-queue-api:8091;
    }

    # HTTP
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        include /etc/nginx/conf.d/routes.inc;
    }

    # HTTPS — nginx가 직접 TLS 종단
    server {
        listen 8443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        add_header Strict-Transport-Security "max-age=31536000" always;

        root /usr/share/nginx/html;
        index index.html;
        include /etc/nginx/conf.d/routes.inc;
    }
}
