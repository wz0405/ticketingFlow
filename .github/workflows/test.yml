name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # ubuntu 러너에는 Docker가 있어 Testcontainers 기반 Lua 테스트까지 전부 실행된다
      - name: Run tests
        working-directory: backend
        run: ./gradlew test
