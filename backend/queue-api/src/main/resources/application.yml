spring:
  data:
    redis:
      repositories:
        enabled: false
  application:
    name: queue-api
  profiles:
    active: local
  threads:
    virtual:
      enabled: true

server:
  port: 8081
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

ticketingflow:
  queue:
    admit-per-tick: ${QUEUE_ADMIT_PER_TICK:100}   # 틱당 입장 허용 인원 (대기열이 크면 이 고정값 사용)
    tick-ms: 1000            # 승격 주기
    active-ttl-sec: 600      # 입장 후 예매 가능 시간(초)
    ws-port: 8091            # Netty WebSocket 푸시 포트
    ws-push-ms: 1000         # 순번 푸시 주기
    # 데모 가변 배출 — 정체/찔끔/웨이브/버스트를 섞어 대기열이 살아있는 것처럼 줄어들게 한다
    demo-dynamic-admit: ${QUEUE_DEMO_DYNAMIC:true}
    demo-dynamic-max-queue: ${QUEUE_DEMO_MAX:1000}   # 이 인원 초과(부하테스트)면 고정 배출로 전환
    demo-avg-admit-per-sec: 7.0                      # 가변 배출 평균 처리율(ETA 계산용)
  jwt:
    secret: ${JWT_SECRET:ticketingflow-dev-secret-please-override-with-32byte-min-key}
    expiry-minutes: 120

---
spring:
  config:
    activate:
      on-profile: local
ticketingflow:
  redis:
    queue:
      host: ${REDIS_QUEUE_HOST:localhost}
      port: ${REDIS_QUEUE_PORT:6379}
    active:
      host: ${REDIS_ACTIVE_HOST:localhost}
      port: ${REDIS_ACTIVE_PORT:6379}
    booking:
      host: ${REDIS_BOOKING_HOST:localhost}
      port: ${REDIS_BOOKING_PORT:6379}

---
spring:
  config:
    activate:
      on-profile: docker
ticketingflow:
  redis:
    queue:
      host: tr-redis-queue
      port: 6379
    active:
      host: tr-redis-active
      port: 6379
    booking:
      host: tr-redis-booking
      port: 6379
